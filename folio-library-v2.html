<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folio | Library Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --sky: #80ffff;
            --black: #0a0a0a;
            --soft: #f0fefe;
            --muted: #5a7a7a;
            --border: #0a0a0a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--black);
            min-height: 100vh;
        }

        /* ── SIDEBAR LAYOUT ── */
        #layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            background: var(--black);
            color: var(--bg);
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .brand-block {}

        .brand-tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--sky);
            margin-bottom: 12px;
        }

        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: 3.8rem;
            line-height: 0.9;
            color: var(--bg);
            letter-spacing: -2px;
        }

        .brand-name em {
            font-style: italic;
            color: var(--sky);
        }

        .brand-sub {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6a9898;
            margin-top: 14px;
            line-height: 1.6;
        }

        /* sidebar stats */
        .sidebar-stats {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .s-stat {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid #1e1e1e;
        }

        .s-stat:first-child { border-top: 1px solid #1e1e1e; }

        .s-stat-label {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6a9898;
        }

        .s-stat-val {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            color: var(--sky);
            line-height: 1;
        }

        /* capacity bar */
        .cap-section { }

        .cap-top {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #6a9898;
            margin-bottom: 10px;
        }

        .cap-top span:last-child { color: var(--sky); }

        .cap-track {
            height: 4px;
            background: #1e1e1e;
            border-radius: 2px;
            overflow: hidden;
        }

        #cap-fill {
            height: 100%;
            background: var(--sky);
            width: 0%;
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.65,0,0.35,1);
        }

        #cap-fill.warn { background: #ff6b6b; }

        /* genre list in sidebar */
        .genre-section-label {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #6a9898;
            margin-bottom: 12px;
        }

        .genre-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .genre-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.15s;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.06em;
            color: #aaaaaa;
        }

        .genre-item:hover { background: #1a1a1a; color: var(--bg); }

        .genre-item.active {
            background: var(--sky);
            color: var(--black);
            font-weight: 500;
        }

        .genre-count {
            font-size: 0.6rem;
            background: #222;
            color: #888;
            padding: 2px 7px;
            border-radius: 20px;
        }

        .genre-item.active .genre-count {
            background: rgba(0,0,0,0.15);
            color: var(--black);
        }

        .add-btn {
            margin-top: auto;
            background: var(--sky);
            border: none;
            padding: 16px;
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--black);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-btn:hover { background: #ffffff; }
        .add-btn:active { transform: scale(0.98); }

        /* ── MAIN CONTENT ── */
        #main {
            background: var(--bg);
            padding: 40px 48px;
        }

        /* top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e8e8e8;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            letter-spacing: -1px;
            line-height: 1;
        }

        .page-title span { color: var(--muted); font-style: italic; font-size: 1rem; margin-left: 8px; }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 380px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--muted);
            pointer-events: none;
        }

        #search-input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            border: 1.5px solid #d0d0d0;
            border-radius: 0;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            font-weight: 300;
            background: var(--bg);
            color: var(--black);
            outline: none;
            transition: border-color 0.2s;
            letter-spacing: 0.03em;
        }

        #search-input:focus { border-color: var(--sky); background: var(--soft); }
        #search-input::placeholder { color: #ccc; }

        /* ── BOOK TABLE ── */
        .section-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .table-head {
            display: grid;
            grid-template-columns: 2fr 1.4fr 0.7fr 1fr 36px;
            gap: 16px;
            padding: 0 16px 10px;
            border-bottom: 2px solid var(--black);
        }

        .th {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .book-rows { display: flex; flex-direction: column; gap: 0; }

        .book-row {
            display: grid;
            grid-template-columns: 2fr 1.4fr 0.7fr 1fr 36px;
            gap: 16px;
            align-items: center;
            padding: 16px 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
            animation: slideIn 0.25s ease both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .book-row:hover { background: var(--soft); }

        .book-row:hover .row-remove { opacity: 1; }

        .row-title-block {}

        .row-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1rem;
            letter-spacing: -0.3px;
            line-height: 1.2;
            color: var(--black);
        }

        .row-id {
            font-size: 0.58rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #ccc;
            margin-top: 2px;
        }

        .row-author {
            font-size: 0.78rem;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        .row-year {
            font-size: 0.78rem;
            font-weight: 300;
            color: #aaa;
            letter-spacing: 0.05em;
        }

        .genre-tag {
            display: inline-block;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 2px;
        }

        .row-remove {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            color: #ccc;
            opacity: 0;
            transition: 0.15s;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.05em;
            padding: 4px;
        }

        .row-remove:hover { color: #ff6b6b; opacity: 1 !important; }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            color: #ccc;
        }

        .empty-state p {
            font-size: 0.78rem;
            font-weight: 300;
            color: #bbb;
            letter-spacing: 0.05em;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--bg);
            border-top: 4px solid var(--sky);
            padding: 40px;
            width: 100%;
            max-width: 460px;
            animation: modalIn 0.25s cubic-bezier(0.65,0,0.35,1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.25);
        }

        @keyframes modalIn {
            from { transform: translateY(24px) scale(0.97); opacity: 0; }
            to   { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-header {
            margin-bottom: 28px;
        }

        .modal-tag {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .modal h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem;
            letter-spacing: -1px;
            line-height: 1;
        }

        .modal h2 em { font-style: italic; color: var(--muted); }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            font-weight: 300;
            background: var(--bg);
            color: var(--black);
            outline: none;
            border-radius: 0;
            transition: border-color 0.15s;
            appearance: none;
            letter-spacing: 0.03em;
        }

        .form-group input:focus,
        .form-group select:focus { border-color: var(--sky); background: var(--soft); }

        .modal-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 28px;
        }

        .m-btn {
            padding: 13px;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: 0.15s;
        }

        .m-btn-cancel { background: #f0f0f0; color: var(--muted); }
        .m-btn-cancel:hover { background: #e0e0e0; }

        .m-btn-save { background: var(--sky); color: var(--black); }
        .m-btn-save:hover { background: #60eeee; }
        .m-btn-save:active { transform: scale(0.98); }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--black);
            color: var(--sky);
            padding: 12px 20px;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            font-weight: 300;
            letter-spacing: 0.08em;
            border-left: 3px solid var(--sky);
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s cubic-bezier(0.65,0,0.35,1);
            pointer-events: none;
            z-index: 9999;
            max-width: 320px;
        }

        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.error { border-left-color: #ff6b6b; color: #ff6b6b; }

        /* genre tag colours */
        .tag-Fiction      { background: #e8f8f8; color: #007a7a; }
        .tag-Non-fiction  { background: #e8f8ee; color: #006b3a; }
        .tag-Science      { background: #e8eeff; color: #2040aa; }
        .tag-History      { background: #fef8e8; color: #8a5a00; }
        .tag-Fantasy      { background: #f4eeff; color: #6030aa; }
        .tag-Mystery      { background: #0a0a0a; color: #80ffff; }
        .tag-Biography    { background: #fff0f0; color: #aa2020; }
        .tag-Other        { background: #f4f4f4; color: #555555; }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            #layout { grid-template-columns: 1fr; }

            #sidebar {
                position: relative;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 24px;
                gap: 24px;
            }

            .brand-block { width: 100%; }
            .sidebar-stats { flex-direction: row; width: 100%; }
            .s-stat { flex-direction: column; align-items: center; padding: 12px; border: 1px solid #1e1e1e; border-radius: 4px; flex: 1; }
            .cap-section { width: 100%; }
            .genre-section { display: none; }
            .add-btn { width: 100%; }

            #main { padding: 24px; }

            .table-head,
            .book-row { grid-template-columns: 1.6fr 1fr 36px; }

            .th:nth-child(2),  .th:nth-child(3),
            .td-author, .td-year { display: none; }
        }

        @media (max-width: 480px) {
            .table-head, .book-row { grid-template-columns: 1fr 36px; }
            .th:nth-child(4), .td-genre { display: none; }
        }
    </style>
</head>
<body>

<div id="layout">

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar">

        <div class="brand-block">
            <div class="brand-tag">// catalogue system</div>
            <div class="brand-name">Fo<em>lio</em></div>
            <div class="brand-sub">Library book<br>management system</div>
        </div>

        <div class="sidebar-stats">
            <div class="s-stat">
                <div class="s-stat-label">Books</div>
                <div class="s-stat-val" id="s-total">0</div>
            </div>
            <div class="s-stat">
                <div class="s-stat-label">Genres</div>
                <div class="s-stat-val" id="s-genres">0</div>
            </div>
            <div class="s-stat">
                <div class="s-stat-label">Free</div>
                <div class="s-stat-val" id="s-free">20</div>
            </div>
        </div>

        <div class="cap-section">
            <div class="cap-top">
                <span>Capacity</span>
                <span id="cap-pct">0 / 20</span>
            </div>
            <div class="cap-track">
                <div id="cap-fill"></div>
            </div>
        </div>

        <div class="genre-section">
            <div class="genre-section-label">// filter by genre</div>
            <div class="genre-list" id="genre-list"></div>
        </div>

        <button class="add-btn" onclick="openModal()">
            <span>+</span> Add New Book
        </button>

    </aside>

    <!-- ── MAIN ── -->
    <main id="main">

        <div class="top-bar">
            <div class="page-title">
                All Books <span id="result-count"></span>
            </div>
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input type="text" id="search-input" placeholder="Search title or author…" oninput="render()">
            </div>
        </div>

        <div class="section-label" id="section-label">// collection</div>

        <div class="table-head">
            <div class="th">Title</div>
            <div class="th">Author</div>
            <div class="th">Year</div>
            <div class="th">Genre</div>
            <div class="th"></div>
        </div>

        <div class="book-rows" id="book-rows"></div>

    </main>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-tag">// new entry</div>
            <h2>Add a <em>book.</em></h2>
        </div>
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="f-title" placeholder="e.g. Dune">
        </div>
        <div class="form-group">
            <label>Author *</label>
            <input type="text" id="f-author" placeholder="e.g. Frank Herbert">
        </div>
        <div class="form-group">
            <label>Year</label>
            <input type="number" id="f-year" placeholder="e.g. 1965" min="1000" max="2099">
        </div>
        <div class="form-group">
            <label>Genre</label>
            <select id="f-genre">
                <option value="Fiction">Fiction</option>
                <option value="Non-fiction">Non-fiction</option>
                <option value="Science">Science</option>
                <option value="History">History</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Mystery">Mystery</option>
                <option value="Biography">Biography</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="modal-btns">
            <button class="m-btn m-btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="m-btn m-btn-save" onclick="addBook()">Add to Catalogue</button>
        </div>
    </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
    const MAX = 20;

    let books = [
        { id:1,  title:'To Kill a Mockingbird',  author:'Harper Lee',         year:1960, genre:'Fiction'     },
        { id:2,  title:'A Brief History of Time', author:'Stephen Hawking',    year:1988, genre:'Science'     },
        { id:3,  title:'The Hobbit',              author:'J.R.R. Tolkien',     year:1937, genre:'Fantasy'     },
        { id:4,  title:'Sapiens',                 author:'Yuval Noah Harari',  year:2011, genre:'History'     },
        { id:5,  title:'Gone Girl',               author:'Gillian Flynn',      year:2012, genre:'Mystery'     },
        { id:6,  title:'Steve Jobs',              author:'Walter Isaacson',    year:2011, genre:'Biography'   },
        { id:7,  title:'1984',                    author:'George Orwell',      year:1949, genre:'Fiction'     },
        { id:8,  title:'The Selfish Gene',        author:'Richard Dawkins',    year:1976, genre:'Science'     },
        { id:9,  title:'Dune',                    author:'Frank Herbert',      year:1965, genre:'Fantasy'     },
        { id:10, title:'Educated',                author:'Tara Westover',      year:2018, genre:'Biography'   },
    ];
    let nextId = 11;
    let activeGenre = 'All';
    let toastTimer = null;

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();

        let visible = [...books];
        if (q) visible = visible.filter(b =>
            b.title.toLowerCase().includes(q) ||
            b.author.toLowerCase().includes(q)
        );
        if (activeGenre !== 'All') visible = visible.filter(b => b.genre === activeGenre);

        // rows
        const rows = document.getElementById('book-rows');
        rows.innerHTML = '';

        if (visible.length === 0) {
            rows.innerHTML = `
                <div class="empty-state">
                    <h3>Nothing here.</h3>
                    <p>No books match your query — try a different search.</p>
                </div>`;
        } else {
            visible.forEach((b, i) => {
                const row = document.createElement('div');
                row.className = 'book-row';
                row.style.animationDelay = (i * 30) + 'ms';
                row.innerHTML = `
                    <div class="row-title-block">
                        <div class="row-title">${esc(b.title)}</div>
                        <div class="row-id">#${String(b.id).padStart(4,'0')}</div>
                    </div>
                    <div class="row-author td-author">${esc(b.author)}</div>
                    <div class="row-year td-year">${b.year || '—'}</div>
                    <div class="td-genre">
                        <span class="genre-tag tag-${b.genre.replace(/\s/g,'-')}">${b.genre}</span>
                    </div>
                    <button class="row-remove" onclick="removeBook(${b.id})" title="Remove">del</button>
                `;
                rows.appendChild(row);
            });
        }

        // genre list sidebar
        const genres = ['All', ...new Set(books.map(b => b.genre))];
        const gList = document.getElementById('genre-list');
        gList.innerHTML = '';
        genres.forEach(g => {
            const cnt = g === 'All' ? books.length : books.filter(b => b.genre === g).length;
            const item = document.createElement('div');
            item.className = 'genre-item' + (g === activeGenre ? ' active' : '');
            item.innerHTML = `<span>${g}</span><span class="genre-count">${cnt}</span>`;
            item.onclick = () => { activeGenre = g; render(); };
            gList.appendChild(item);
        });

        // stats
        const pct = Math.round((books.length / MAX) * 100);
        document.getElementById('s-total').textContent  = books.length;
        document.getElementById('s-genres').textContent = new Set(books.map(b => b.genre)).size;
        document.getElementById('s-free').textContent   = MAX - books.length;
        document.getElementById('cap-pct').textContent  = `${books.length} / ${MAX}`;

        const fill = document.getElementById('cap-fill');
        fill.style.width = pct + '%';
        fill.className   = pct >= 100 ? 'warn' : '';

        // page title count
        const rc = document.getElementById('result-count');
        rc.textContent = visible.length !== books.length ? `(${visible.length} shown)` : '';

        // section label
        document.getElementById('section-label').textContent =
            activeGenre === 'All' ? '// full collection' : `// ${activeGenre.toLowerCase()}`;
    }

    function openModal() {
        if (books.length >= MAX) { showToast('Shelf capacity reached — remove a book first.', true); return; }
        ['f-title','f-author','f-year'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-genre').value = 'Fiction';
        document.getElementById('modal-overlay').classList.add('open');
        setTimeout(() => document.getElementById('f-title').focus(), 60);
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
    }

    function addBook() {
        const title  = document.getElementById('f-title').value.trim();
        const author = document.getElementById('f-author').value.trim();
        const year   = document.getElementById('f-year').value.trim();
        const genre  = document.getElementById('f-genre').value;

        if (!title || !author) { showToast('Title and author cannot be empty.', true); return; }
        if (books.length >= MAX) { showToast('Catalogue full!', true); return; }

        books.push({ id: nextId++, title, author, year: year ? parseInt(year) : '', genre });
        closeModal();
        activeGenre = 'All';
        render();
        showToast(`"${title}" added to catalogue.`);
    }

    function removeBook(id) {
        const b = books.find(x => x.id === id);
        books = books.filter(x => x.id !== id);
        if (activeGenre !== 'All' && !books.some(x => x.genre === activeGenre)) activeGenre = 'All';
        render();
        if (b) showToast(`"${b.title}" removed from catalogue.`);
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = (isError ? 'error' : '') + ' show';
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.getElementById('modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) addBook();
    });

    render();
</script>

</body>
</html>
